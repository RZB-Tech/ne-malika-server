# pnpm 11: build-скрипты зависимостей не выполняются, пока не разрешены явно.
# При strictDepBuilds (включён по умолчанию) любой неупомянутый пакет со
# скриптом валит `pnpm install` — поэтому здесь перечислены все, что выдаёт
# "Ignored build scripts", включая те, что сборка не нужна (false).
allowBuilds:
  # postinstall печатает баннер с просьбой о донате — выполнять незачем.
  '@nestjs/core': false
  # ставит платформенный бинарник; нужен tsx и drizzle-kit (миграции).
  esbuild: true
