services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nemalika-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nemalika
    ports:
      - '5450:5432'
    volumes:
      - nemalika_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  nemalika_pg_data:
  redis_data:
